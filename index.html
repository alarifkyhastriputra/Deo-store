<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Deo MLBB Skin Store</title>

<style>
body{
  font-family:Arial, sans-serif;
  background:#eaf6ff;
  color:#111;
  margin:0;
  text-align:center;
}

/* HEADER */
.header{
  display:flex;
  flex-wrap:wrap;
  justify-content:space-between;
  align-items:center;
  padding:15px 20px;
  background:linear-gradient(90deg,#00bfff,#008cff);
  color:white;
}
.logo{
  font-size:22px;
  font-weight:bold;
  margin-bottom:5px;
}

/* SEARCH */
input{
  padding:10px;
  width:230px;
  border-radius:8px;
  border:none;
  outline:none;
  margin-bottom:5px;
}

/* GREETING */
#greeting{
  font-size:22px;
  margin:15px 0;
  font-weight:bold;
  color:#0066cc;
}

/* ANNOUNCEMENT */
.announcement{
  background:white;
  width:80%;
  max-width:600px;
  margin:10px auto;
  padding:12px;
  border-radius:10px;
  border:1px solid #cfe9ff;
  color:#0066cc;
  font-weight:bold;
}

/* HERO RESULT */
.result{
  margin-top:10px;
}
.hero{
  display:block;
  background:white;
  padding:10px;
  margin:5px auto;
  width:90%;
  max-width:220px;
  color:#008cff;
  text-decoration:none;
  border-radius:10px;
  border:1px solid #cfe9ff;
  transition:0.2s;
}
.hero:hover{
  background:#f2f9ff;
}

/* BANNER */
.banner{
  margin-top:20px;
}
.banner img{
  width:90%;
  max-width:800px;
  border-radius:12px;
  box-shadow:0 8px 20px rgba(0,0,0,0.1);
}

/* ROLE BUTTON */
.roles{
  display:flex;
  flex-wrap:wrap;
  justify-content:center;
  margin:20px 0;
}
.role{
  padding:14px 24px;
  margin:10px;
  font-size:18px;
  border:none;
  border-radius:10px;
  background:linear-gradient(90deg,#00bfff,#008cff);
  color:white;
  cursor:pointer;
  transition:0.2s;
}
.role:hover{
  background:linear-gradient(90deg,#008cff,#0066ff);
}

/* FOOTER */
.footer{
  margin-top:40px;
  padding:15px;
  font-size:13px;
  color:#666;
}

/* RESPONSIVE MOBILE */
@media(max-width:480px){
  .header{
    flex-direction:column;
  }
  input{
    width:90%;
  }
  .roles{
    flex-direction:column;
  }
  .role{
    width:90%;
    font-size:16px;
  }
}
</style>
</head>

<body>

<div class="header">
  <div class="logo">💎 Deo Store</div>
  <input type="text" id="searchHero" placeholder="Cari hero..." onkeyup="searchHero()">
</div>

<div id="greeting"></div>

<div class="announcement">
Pengumuman: Skin terbaru akan segera ditambahkan!
</div>

<div id="result" class="result"></div>

<!-- BANNER -->
<div class="banner">
<img src="PASTE_LINK_BANNER_DISINI" alt="Banner">
</div>

<h2>Pilih Role Hero</h2>
<div class="roles">
  <button class="role" onclick="goRole('mage')">Mage</button>
  <button class="role" onclick="goRole('fighter')">Fighter</button>
  <button class="role" onclick="goRole('assassin')">Assassin</button>
  <button class="role" onclick="goRole('marksman')">Marksman</button>
  <button class="role" onclick="goRole('support')">Support</button>
  <button class="role" onclick="goRole('tank')">Tank</button>
</div>

<script>
function goRole(role){
  location.href = "role.html?role=" + role;
}

// Salam otomatis
function greetingTime(){
  let hour = new Date().getHours();
  let text = "";
  if(hour >= 5 && hour < 11) text = "🌅 Selamat Pagi";
  else if(hour >= 11 && hour < 15) text = "☀️ Selamat Siang";
  else if(hour >= 15 && hour < 18) text = "🌤 Selamat Sore";
  else text = "🌙 Selamat Malam";
  document.getElementById("greeting").innerText = text;
}
greetingTime();

// Hero lengkap
let heroes = [
{ name:"chou", role:"fighter" },{ name:"freya", role:"fighter" },{ name:"balmond", role:"fighter" },{ name:"aldous", role:"fighter" },{ name:"argus", role:"fighter" },
{ name:"nana", role:"mage" },{ name:"eudora", role:"mage" },{ name:"kagura", role:"mage" },{ name:"cyclops", role:"mage" },{ name:"lunox", role:"mage" },
{ name:"miya", role:"marksman" },{ name:"layla", role:"marksman" },{ name:"bruno", role:"marksman" },{ name:"beatrix", role:"marksman" },{ name:"hanabi", role:"marksman" },
{ name:"saber", role:"assassin" },{ name:"fanny", role:"assassin" },{ name:"gusion", role:"assassin" },{ name:"ling", role:"assassin" },
{ name:"tigreal", role:"tank" },{ name:"franco", role:"tank" },{ name:"atlas", role:"tank" },{ name:"akai", role:"tank" },
{ name:"estes", role:"support" },{ name:"angela", role:"support" },{ name:"rafaela", role:"support" },{ name:"diggie", role:"support" }
];

function searchHero(){
  let input = document.getElementById("searchHero").value.toLowerCase();
  let result = document.getElementById("result");
  result.innerHTML="";
  heroes.forEach(hero=>{
    if(hero.name.includes(input) && input!==""){
      result.innerHTML += `<a class="hero" href="${hero.role}/${hero.name}.html">${hero.name.toUpperCase()}</a>`;
    }
  });
}
</script>

<div class="footer">
Cuma 1KB doang
</div>

</body>
</html>

<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Deo MLBB Skin Store</title>

<style>
body{
  font-family:Arial, sans-serif;
  background:#eaf6ff;
  color:#111;
  margin:0;
  text-align:center;
}

/* HEADER */
.header{
  display:flex;
  flex-wrap:wrap;
  justify-content:space-between;
  align-items:center;
  padding:15px 20px;
  background:linear-gradient(90deg,#00bfff,#008cff);
  color:white;
}
.logo{
  font-size:22px;
  font-weight:bold;
  margin-bottom:5px;
}

/* SEARCH */
input{
  padding:10px;
  width:230px;
  border-radius:8px;
  border:none;
  outline:none;
  margin-bottom:5px;
}

/* GREETING */
#greeting{
  font-size:22px;
  margin:15px 0;
  font-weight:bold;
  color:#0066cc;
}

/* ANNOUNCEMENT */
.announcement{
  background:white;
  width:80%;
  max-width:600px;
  margin:10px auto;
  padding:12px;
  border-radius:10px;
  border:1px solid #cfe9ff;
  color:#0066cc;
  font-weight:bold;
}

/* HERO RESULT */
.result{
  margin-top:10px;
}
.hero{
  display:block;
  background:white;
  padding:10px;
  margin:5px auto;
  width:90%;
  max-width:220px;
  color:#008cff;
  text-decoration:none;
  border-radius:10px;
  border:1px solid #cfe9ff;
  transition:0.2s;
}
.hero:hover{
  background:#f2f9ff;
}

/* BANNER */
.banner{
  margin-top:20px;
}
.banner img{
  width:90%;
  max-width:800px;
  border-radius:12px;
  box-shadow:0 8px 20px rgba(0,0,0,0.1);
}

/* ROLE BUTTON */
.roles{
  display:flex;
  flex-wrap:wrap;
  justify-content:center;
  margin:20px 0;
}
.role{
  padding:14px 24px;
  margin:10px;
  font-size:18px;
  border:none;
  border-radius:10px;
  background:linear-gradient(90deg,#00bfff,#008cff);
  color:white;
  cursor:pointer;
  transition:0.2s;
}
.role:hover{
  background:linear-gradient(90deg,#008cff,#0066ff);
}

/* FOOTER */
.footer{
  margin-top:40px;
  padding:15px;
  font-size:13px;
  color:#666;
}

/* RESPONSIVE MOBILE */
@media(max-width:480px){
  .header{
    flex-direction:column;
  }
  input{
    width:90%;
  }
  .roles{
    flex-direction:column;
  }
  .role{
    width:90%;
    font-size:16px;
  }
}
</style>
</head>

<body>

<div class="header">
  <div class="logo">💎 Deo Store</div>
  <input type="text" id="searchHero" placeholder="Cari hero..." onkeyup="searchHero()">
</div>

<div id="greeting"></div>

<div class="announcement">
Pengumuman: Skin terbaru akan segera ditambahkan!
</div>

<div id="result" class="result"></div>

<!-- BANNER -->
<div class="banner">
<img src="PASTE_LINK_BANNER_DISINI" alt="Banner">
</div>

<h2>Pilih Role Hero</h2>
<div class="roles">
  <button class="role" onclick="goRole('mage')">Mage</button>
  <button class="role" onclick="goRole('fighter')">Fighter</button>
  <button class="role" onclick="goRole('assassin')">Assassin</button>
  <button class="role" onclick="goRole('marksman')">Marksman</button>
  <button class="role" onclick="goRole('support')">Support</button>
  <button class="role" onclick="goRole('tank')">Tank</button>
</div>

<script>
function goRole(role){
  location.href = "role.html?role=" + role;
}

// Salam otomatis
function greetingTime(){
  let hour = new Date().getHours();
  let text = "";
  if(hour >= 5 && hour < 11) text = "🌅 Selamat Pagi";
  else if(hour >= 11 && hour < 15) text = "☀️ Selamat Siang";
  else if(hour >= 15 && hour < 18) text = "🌤 Selamat Sore";
  else text = "🌙 Selamat Malam";
  document.getElementById("greeting").innerText = text;
}
greetingTime();

// Hero lengkap semua role
let heroes = [
  // Mage
  "bane","julian","nana","eudora","gord","kagura","cyclops","aurora","vexana","odette",
  "zhask","pharsa","valir","change","vale","lunox","harith","lylia","cecilion","luo_yi",
  "yve","valentina","xavier","novaria","kadita","alice","esmeralda","zhuxin",
  // Assassin
  "saber","karina","fanny","hayabusa","natalia","lancelot","helcurt","gusion","hanzo",
  "ling","aamon","joy","nolan","benedetta","harley","selena","yi_shun_shin","suyou",
  // Fighter
  "balmond","freya","chou","sun","alpha","lapu_lapu","argus","jawhead","martis","aldous",
  "leomord","thamuz","minsitthar","badang","guinevere","terizla","xborg","dyrroth",
  "silvanna","yu_zhong","khaleed","phoveus","aulus","cici","alucard","zilong","paquito",
  "yin","arlott","roger","ruby","hilda","masha","fredrinn","lukas",
  // Marksman
  "miya","bruno","clint","layla","moskov","irithel","hanabi","claude","granger",
  "wanwan","popol_kupa","brody","beatrix","natan","melissa","ixia","lesley","kimmy",
  // Support
  "rafaela","estes","diggie","angela","floryn","mathilda","kaja","faramis",
  "lolita","carmilla","chip",
  // Tank
  "tigreal","akai","franco","hylos","uranus","belerick","khufra","baxia","atlas",
  "gloo","gatotkaca","grock","barats","edith","minotaur","johnson"
];

// Mapping hero ke role (untuk link)
let heroRole = {
  "bane":"mage","julian":"mage","nana":"mage","eudora":"mage","gord":"mage","kagura":"mage",
  "cyclops":"mage","aurora":"mage","vexana":"mage","odette":"mage","zhask":"mage","pharsa":"mage",
  "valir":"mage","change":"mage","vale":"mage","lunox":"mage","harith":"mage","lylia":"mage",
  "cecilion":"mage","luo_yi":"mage","yve":"mage","valentina":"mage","xavier":"mage",
  "novaria":"mage","kadita":"mage","alice":"mage","esmeralda":"mage","zhuxin":"mage",

  "saber":"assassin","karina":"assassin","fanny":"assassin","hayabusa":"assassin","natalia":"assassin",
  "lancelot":"assassin","helcurt":"assassin","gusion":"assassin","hanzo":"assassin","ling":"assassin",
  "aamon":"assassin","joy":"assassin","nolan":"assassin","benedetta":"assassin","harley":"assassin",
  "selena":"assassin","yi_shun_shin":"assassin","suyou":"assassin",

  "balmond":"fighter","freya":"fighter","chou":"fighter","sun":"fighter","alpha":"fighter",
  "lapu_lapu":"fighter","argus":"fighter","jawhead":"fighter","martis":"fighter","aldous":"fighter",
  "leomord":"fighter","thamuz":"fighter","minsitthar":"fighter","badang":"fighter","guinevere":"fighter",
  "terizla":"fighter","xborg":"fighter","dyrroth":"fighter","silvanna":"fighter","yu_zhong":"fighter",
  "khaleed":"fighter","phoveus":"fighter","aulus":"fighter","cici":"fighter","alucard":"fighter",
  "zilong":"fighter","paquito":"fighter","yin":"fighter","arlott":"fighter","roger":"fighter",
  "ruby":"fighter","hilda":"fighter","masha":"fighter","fredrinn":"fighter","lukas":"fighter",

  "miya":"marksman","bruno":"marksman","clint":"marksman","layla":"marksman","moskov":"marksman",
  "irithel":"marksman","hanabi":"marksman","claude":"marksman","granger":"marksman","wanwan":"marksman",
  "popol_kupa":"marksman","brody":"marksman","beatrix":"marksman","natan":"marksman","melissa":"marksman",
  "ixia":"marksman","lesley":"marksman","kimmy":"marksman",

  "rafaela":"support","estes":"support","diggie":"support","angela":"support","floryn":"support",
  "mathilda":"support","kaja":"support","faramis":"support","lolita":"support","carmilla":"support",
  "chip":"support",

  "tigreal":"tank","akai":"tank","franco":"tank","hylos":"tank","uranus":"tank","belerick":"tank",
  "khufra":"tank","baxia":"tank","atlas":"tank","gloo":"tank","gatotkaca":"tank","grock":"tank",
  "barats":"tank","edith":"tank","minotaur":"tank","johnson":"tank"
};

// Fungsi search lengkap
function searchHero(){
  let input = document.getElementById("searchHero").value.toLowerCase();
  let result = document.getElementById("result");
  result.innerHTML="";
  heroes.forEach(hero=>{
    if(hero.includes(input) && input!==""){
      let role = heroRole[hero];
      result.innerHTML += `<a class="hero" href="${role}/${hero}.html">${hero.toUpperCase()}</a>`;
    }
  });
}
</script>

<div class="footer">
Cuma 1KB doang
</div>

</body>
</html>
